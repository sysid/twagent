# twagent canonical configuration — schema v2
# Migrated from:
#   ~/dev/s/private/devops-binx/agent/global/vars.yaml  (render.py)
#   ~/.config/twmcp/config.toml                          (twmcp)
#   ~/.config/twagent/config.toml v1 (previous migration; superseded)
#
# v2 changes vs v1:
#   - [[scopes]] blocks GONE. Each agent now has `global_profile = "..."`.
#   - --scope and --only CLI flags GONE.
#   - --select is polymorphic: accepts profile names AND artifact names, mixed.
#   - New CLI mode: `apply --here --select <names>` for ad-hoc cwd deploys.

schema_version = 2
env_file = "secrets.env"

[common]
templates_dir = "~/.config/twagent/templates"

[common.vars]
user_name  = "Tom"
work_email = "thomas.we.weber@gmail.com"
style_guide = "strict engineering standards"
working_directory = "./thoughts"


# ─── Agents ────────────────────────────────────────────────────────────

[agents.claude-code]
capabilities   = ["instructions", "skills", "subagents", "mcp"]
mcp_format     = "claude-code"
global_profile = "tw-claude"

[agents.claude-code.paths.global]
instructions = ["~/.claude/CLAUDE.md"]
skills       = ["~/dev/s/private/devops-binx/configs/claude/dot-claude/skills"]
subagents    = ["~/.claude/agents"]
mcp          = ["~/.claude.json"]

[agents.claude-code.paths.project]
skills    = [".claude/skills"]
subagents = [".claude/agents"]
mcp       = [".mcp.json"]

[agents.claude-code.templates]
instructions = "AGENT.md.j2"

[agents.claude-code.vars]
agent_name = "Claude"
extra_instructions = []


[agents.copilot-cli]
capabilities   = ["instructions", "skills", "subagents", "mcp"]
mcp_format     = "copilot-cli"
global_profile = "tw-copilot"

[agents.copilot-cli.paths.global]
# Dual-target: devops-binx stow dir AND IntelliJ's global location.
instructions = [
  "~/dev/s/private/devops-binx/configs/copilot/dot-copilot/copilot-instructions.md",
  "~/.config/github-copilot/intellij/global-copilot-instructions.md",
]
skills    = ["~/dev/s/private/devops-binx/configs/copilot/dot-copilot/skills"]
subagents = ["~/.copilot/agents"]
mcp       = ["~/.copilot/mcp-config.json"]

[agents.copilot-cli.paths.project]
skills    = [".github/skills"]
subagents = [".github/agents"]
mcp       = [".mcp.json"]

[agents.copilot-cli.templates]
instructions = "AGENT.md.j2"

[agents.copilot-cli.vars]
agent_name = "Copilot"
extra_instructions = [
  "When running commands which output more than 4KB you MUST pipe to a file and then read it from the file. There is a bug in your PTY handling (https://github.com/github/copilot-cli/issues/2182).",
]


[agents.pi]
capabilities   = ["instructions", "skills", "mcp"]
mcp_format     = "pi"
global_profile = "tw-pi"

[agents.pi.paths.global]
instructions = ["~/.pi/agent/AGENTS.md"]
skills       = ["~/dev/s/private/devops-binx/configs/pi/dot-pi/agent/skills"]
mcp          = ["~/.pi/mcp.json"]

[agents.pi.paths.project]
skills = [".pi/skills"]
mcp    = [".pi/mcp.json"]

[agents.pi.templates]
instructions = "AGENT.md.j2"

[agents.pi.vars]
agent_name = "Pi"
extra_instructions = []


