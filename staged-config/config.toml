# ─── MCP servers ────────────────────────────────────────────────────────

[servers.los-mcp-local]
type  = "sse"
url   = "http://localhost:8113/mcp/sse"
tools = ["*"]

[servers.aws-mcp]
type    = "stdio"
command = "bash"
args    = ["-lc", "AWS_PROFILE=${AWS_PROFILE:-XXX} uvx --with socksio mcp-proxy-for-aws@latest https://aws-mcp.us-east-1.api.aws/mcp --metadata AWS_REGION=${AWS_REGION:-XXX}"]
tools   = ["*"]

[servers.aws-mcp-e2e-losnext-emea]
type    = "stdio"
command = "bash"
args    = ["-lc", "AWS_PROFILE=e2e-losnext-admin uvx --with socksio mcp-proxy-for-aws@latest https://aws-mcp.eu-central-1.api.aws/mcp --metadata AWS_REGION=eu-central-1"]
tools   = ["*"]

[servers.aws-mcp-e2e-los-emea]
type    = "stdio"
command = "bash"
args    = ["-lc", "AWS_PROFILE=e2e-los-admin uvx --with socksio mcp-proxy-for-aws@latest https://aws-mcp.eu-central-1.api.aws/mcp --metadata AWS_REGION=eu-central-1"]
tools   = ["*"]

[servers.aws-mcp-e2e-losnext-us]
type    = "stdio"
command = "bash"
args    = ["-lc", "AWS_PROFILE=e2e-losnext-admin uvx --with socksio mcp-proxy-for-aws@latest https://aws-mcp.us-east-1.api.aws/mcp --metadata AWS_REGION=us-east-1"]
tools   = ["*"]

[servers.aws-mcp-e2e-los-us]
type    = "stdio"
command = "bash"
args    = ["-lc", "AWS_PROFILE=e2e-los-admin uvx --with socksio mcp-proxy-for-aws@latest https://aws-mcp.us-east-1.api.aws/mcp --metadata AWS_REGION=us-east-1"]
tools   = ["*"]

[servers.aws-mcp-prod-losnext-emea]
type    = "stdio"
command = "bash"
args    = ["-lc", "AWS_PROFILE=prod-losnext-admin uvx --with socksio mcp-proxy-for-aws@latest https://aws-mcp.eu-central-1.api.aws/mcp --metadata AWS_REGION=eu-central-1"]
