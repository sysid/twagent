command = "bash"
args    = ["-lc", "AWS_PROFILE=prod-los-admin uvx --with socksio mcp-proxy-for-aws@latest https://aws-mcp.eu-central-1.api.aws/mcp --metadata AWS_REGION=eu-central-1"]
tools   = ["*"]

[servers.aws-mcp-prod-losnext-us]
type    = "stdio"
command = "bash"
args    = ["-lc", "AWS_PROFILE=prod-losnext-admin uvx --with socksio mcp-proxy-for-aws@latest https://aws-mcp.us-east-1.api.aws/mcp --metadata AWS_REGION=us-east-1"]
tools   = ["*"]

[servers.aws-mcp-prod-los-us]
type    = "stdio"
command = "bash"
args    = ["-lc", "AWS_PROFILE=prod-los-admin uvx --with socksio mcp-proxy-for-aws@latest https://aws-mcp.us-east-1.api.aws/mcp --metadata AWS_REGION=us-east-1"]
tools   = ["*"]

[servers.mcp-atlassian]
type = "http"
url  = "https://atc.bmwgroup.net/mcp/"
[servers.mcp-atlassian.headers]
X-Atlassian-Confluence-Personal-Token = "${CONFLUENCE_PAT:-XXX}"
X-Atlassian-Confluence-Url            = "https://atc.bmwgroup.net/confluence"
X-Atlassian-Jira-Personal-Token       = "${JIRA_PAT:-XXX}"
X-Atlassian-Jira-Url                  = "https://atc.bmwgroup.net/jira"


# ─── Skill profiles ────────────────────────────────────────────────────

[profiles.core]
skills = ["twmux", "skill-creator", "bkmr-memory", "tw-comprehend", "tw-project-docs", "tw-research-codebase"]

[profiles.pr_review]
skills = ["tw-review", "tw-add-pr-review", "tw-add-pr-comment", "tw-check-pr"]

[profiles.web_research]
skills = ["tw-web-search", "tw-web-researcher", "tw-web-browser"]

[profiles.java]
skills = ["tw-dependency-update-java", "tw-fix-cves"]

[profiles.rust]
skills = ["tw-dependency-update-rust"]

[profiles.bmw]
skills = ["code-rationale", "jira-creator"]

[profiles.fun]
skills = ["cobra", "say"]

[profiles.claude_local]
skills = ["tw-vhs-demo"]

[profiles.writing]
skills = ["writing-clearly-and-concisely", "tw-fix-grammar"]


# ─── MCP-only profiles (compose into per-agent or use ad-hoc via --here --select) ─

[profiles.e2e-emea]
servers = ["aws-mcp-e2e-losnext-emea", "aws-mcp-e2e-los-emea"]

[profiles.e2e-us]
servers = ["aws-mcp-e2e-losnext-us", "aws-mcp-e2e-los-us"]

[profiles.mcp-baseline]
servers = [
  "los-mcp-local",
  "aws-mcp",
  "aws-mcp-prod-losnext-emea", "aws-mcp-prod-los-emea",
  "aws-mcp-prod-losnext-us",   "aws-mcp-prod-los-us",
  "mcp-atlassian",
]


# ─── Per-agent unified profiles (referenced by global_profile = "...") ──

[profiles.tw-claude]
extends = ["core", "pr_review", "web_research", "java", "rust", "claude_local", "mcp-baseline"]

[profiles.tw-copilot]
extends = ["core", "pr_review", "web_research", "java", "rust", "bmw", "mcp-baseline"]

[profiles.tw-pi]
extends = ["core", "pr_review", "web_research", "java", "rust", "mcp-baseline"]


# ─── No [[scopes]] ─────────────────────────────────────────────────────
# Project-local deployment is now ad-hoc, e.g.:
#
#   cd ~/dev/los/los-cha
#   twagent apply --here --select tw-claude,tw-cucumber-to-http --agent claude-code
#   twagent apply --here --select tw-copilot,tw-cucumber-to-http --agent copilot-cli
#
# Switching to the e2e environment for an MCP session:
#
#   twagent apply --select e2e-emea               # globally swap in e2e servers
#   twagent apply --here --select e2e-us          # locally for this repo
