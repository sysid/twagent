# Test fixture: covers all entity types from data-model.md.
# Used by test_config.py (validation matrix) and downstream tests.
# Schema v3: no [[scopes]]; instructions are first-class registry artifacts.
schema_version = 3
env_file = "secrets.env"

[common.vars]
user_name  = "Tom"
work_email = "test@example.com"

# ─── Agents ─────────────────────────────────────────────────────────────
[agents.claude-code]
capabilities   = ["instructions", "skills", "subagents", "mcp"]
mcp_format     = "claude-code"
global_profile = "tw"

[agents.claude-code.paths.global]
instructions = ["~/.claude/CLAUDE.md"]
skills       = ["~/.claude/skills"]
subagents    = ["~/.claude/agents"]
mcp          = ["~/.claude.json"]

[agents.claude-code.paths.project]
skills    = [".claude/skills"]
subagents = [".claude/agents"]
mcp       = [".mcp.json"]

[agents.claude-code.vars]
agent_name = "Claude"
extra_instructions = []

[agents.copilot-cli]
capabilities   = ["instructions", "skills", "subagents", "mcp"]
mcp_format     = "copilot-cli"
global_profile = "tw"

[agents.copilot-cli.paths.global]
instructions = ["~/.copilot/copilot-instructions.md"]
skills       = ["~/.copilot/skills"]
subagents    = ["~/.copilot/agents"]
mcp          = ["~/.copilot/mcp-config.json"]

[agents.copilot-cli.paths.project]
skills    = [".github/skills"]
subagents = [".github/agents"]
mcp       = [".github/copilot/mcp.json"]

[agents.copilot-cli.vars]
agent_name = "Copilot"
extra_instructions = []

[agents.pi]
capabilities   = ["instructions", "skills", "mcp"]
mcp_format     = "pi"
global_profile = "minimal"   # pi gets the lighter profile

[agents.pi.paths.global]
instructions = ["~/.pi/agent/AGENTS.md"]
skills       = ["~/.pi/agent/skills"]
mcp          = ["~/.pi/mcp.json"]

[agents.pi.paths.project]
skills = [".pi/skills"]
mcp    = [".pi/mcp.json"]

[agents.pi.vars]
agent_name = "Pi"
extra_instructions = []

# codex is the only TOML target: its MCP lives in ~/.codex/config.toml, which
# is also codex's own state file. No subagents (codex's are .toml, not .md) and
# no prompts (deprecated upstream).
[agents.codex]
capabilities   = ["instructions", "skills", "mcp"]
mcp_format     = "codex"
global_profile = "minimal"

[agents.codex.paths.global]
instructions = ["~/.codex/AGENTS.md"]
skills       = ["~/.agents/skills"]
mcp          = ["~/.codex/config.toml"]

[agents.codex.paths.project]
skills = [".agents/skills"]
mcp    = [".codex/config.toml"]

[agents.codex.vars]
agent_name = "Codex"
extra_instructions = []

# ─── Instructions registry ─────────────────────────────────────────────
[instructions.AGENT-md]
source = "/tmp/twagent-test/templates/AGENT.md.j2"

# ─── Artifact registry ──────────────────────────────────────────────────
[skills.bkmr-memory]
source      = "/tmp/twagent-test/skills/bkmr-memory"
description = "Persistent memory via bkmr CLI"

[skills.tw-review]
source = "/tmp/twagent-test/skills/tw-review"

[subagents.code-reviewer]
source = "/tmp/twagent-test/agents/code-reviewer.md"

[prompts.adr]
source = "/tmp/twagent-test/prompts/adr.prompt.md"

# ─── MCP servers ────────────────────────────────────────────────────────
[servers.github]
type    = "stdio"
command = "npx"
args    = ["-y", "@modelcontextprotocol/server-github"]
env     = { GITHUB_TOKEN = "${GITHUB_TOKEN}" }

[servers.atlassian]
type  = "http"
url   = "https://example.com/mcp/"
tools = ["*"]
[servers.atlassian.headers]
X-Atlassian-Token = "${CONFLUENCE_TOKEN}"
X-Atlassian-Url   = "https://example.com/confluence"

# ─── Profiles ───────────────────────────────────────────────────────────
[profiles.minimal]
description  = "Bare-minimum daily set"
instructions = ["AGENT-md"]
skills       = ["bkmr-memory"]
servers      = ["github"]

[profiles.tw]
extends      = ["minimal"]
description  = "Tom's default loadout"
skills       = ["tw-review"]
subagents    = ["code-reviewer"]
prompts      = ["adr"]
servers      = ["atlassian"]

# Schema v3: no [[scopes]] blocks. Globals come from per-agent
# `global_profile`; ad-hoc local deployment is via `apply --select`.
